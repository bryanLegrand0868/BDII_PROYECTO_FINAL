<div class="container-fluid p-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-file-earmark-code me-2"></i>Scripts SQL Generados</h2>
    <div>
      <a routerLink="/dashboard" class="btn btn-outline-secondary me-2">
        <i class="bi bi-arrow-left"></i> Volver
      </a>
      <button class="btn btn-primary me-2" (click)="load()">
        <i class="bi bi-arrow-clockwise"></i> Refrescar
      </button>
      <button class="btn btn-success" (click)="download()">
        <i class="bi bi-download me-1"></i>Descargar .sql
      </button>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="row mb-3">
        <div class="col-md-4">
          <label>Filtrar por tipo</label>
          <select class="form-select" [(ngModel)]="filter">
            <option value="">Todos</option>
            <option value="CREATE_USER">CREATE USER</option>
            <option value="DROP_USER">DROP USER</option>
            <option value="ALTER_USER">ALTER USER</option>
            <option value="CREATE_ROLE">CREATE ROLE</option>
            <option value="DROP_ROLE">DROP ROLE</option>
            <option value="GRANT">GRANT</option>
            <option value="REVOKE">REVOKE</option>
            <option value="MIXED">MIXED</option>
          </select>
        </div>
      </div>

      <div *ngIf="loading" class="text-center my-3">
        <div class="spinner-border text-primary"></div>
      </div>

      <div class="table-responsive" *ngIf="!loading">
        <table class="table table-hover">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Tipo</th>
              <th>SQL</th>
              <th>Descripción</th>
              <th>Usuario</th>
              <th>Generado</th>
              <th>Aplicado</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let s of filtered()">
              <td>{{ s.SCRIPT_ID }}</td>
              <td>
                <span class="badge"
                      [class.bg-success]="s.SCRIPT_TYPE === 'GRANT'"
                      [class.bg-danger]="s.SCRIPT_TYPE === 'REVOKE' || s.SCRIPT_TYPE === 'DROP_USER' || s.SCRIPT_TYPE === 'DROP_ROLE'"
                      [class.bg-primary]="s.SCRIPT_TYPE === 'CREATE_USER' || s.SCRIPT_TYPE === 'CREATE_ROLE'"
                      [class.bg-warning]="s.SCRIPT_TYPE === 'ALTER_USER'"
                      [class.bg-secondary]="s.SCRIPT_TYPE === 'MIXED'">
                  {{ s.SCRIPT_TYPE }}
                </span>
              </td>
              <td><code class="text-dark">{{ s.SCRIPT_CONTENT }}</code></td>
              <td><small>{{ s.DESCRIPTION }}</small></td>
              <td><small>{{ s.GENERATED_BY_USERNAME }}</small></td>
              <td><small>{{ s.GENERATED_AT | date:'dd/MM HH:mm:ss' }}</small></td>
              <td>
                <span class="badge" [class.bg-success]="s.APPLIED === 'S'" [class.bg-secondary]="s.APPLIED !== 'S'">
                  {{ s.APPLIED === 'S' ? 'SÍ' : 'NO' }}
                </span>
              </td>
            </tr>
            <tr *ngIf="filtered().length === 0">
              <td colspan="7" class="text-center text-muted">Sin scripts</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
